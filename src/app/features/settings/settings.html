<!-- @file Settings ページテンプレート。セクション順は API キー → テーマ → 表示言語 → 法的情報 → モデル優先順位（ドラッグ&ドロップ）→ バージョン情報 → GitHubリポジトリ → アカウント（Google SSO 同期）。
     API キーは最頻使用の設定項目のため先頭に置き、参照頻度の低いアカウント（データ同期）はバージョン情報の下・末尾に置く。
     API キー・モデル優先順位・バージョン情報（リリースノート）・アカウントは各パネルコンポーネントに委譲する。
     テーマ・表示言語・法的情報・GitHubリポジトリ導線は小規模なためこのテンプレートに残す。
     全文言は i18n.t()（core/i18n/I18nService）経由で表示し、言語トグルの操作にリロードなしで追随する。 -->
<div class="page">
  <h1 class="page-title">{{ i18n.t('settings.title') }}</h1>

  <app-api-key-panel />

  <div class="form-group">
    <label class="label">{{ i18n.t('settings.theme') }}</label>
    <div class="theme-toggle">
      <button
        class="theme-btn"
        [class.active]="settings().theme === 'light'"
        (click)="updateTheme('light')"
        type="button"
      >
        {{ i18n.t('settings.themeLight') }}
      </button>
      <button
        class="theme-btn"
        [class.active]="settings().theme === 'dark'"
        (click)="updateTheme('dark')"
        type="button"
      >
        {{ i18n.t('settings.themeDark') }}
      </button>
    </div>
  </div>

  <!-- ── 表示言語（サイドバーの言語トグルと同じ設定を共有する。モバイルではここが唯一の入口） ── -->
  <div class="form-group">
    <label class="label">{{ i18n.t('settings.language') }}</label>
    <div class="theme-toggle">
      <button
        class="theme-btn"
        [class.active]="i18n.lang() === 'ja'"
        (click)="updateLanguage('ja')"
        type="button"
      >
        {{ i18n.t('settings.languageJa') }}
      </button>
      <button
        class="theme-btn"
        [class.active]="i18n.lang() === 'en'"
        (click)="updateLanguage('en')"
        type="button"
      >
        {{ i18n.t('settings.languageEn') }}
      </button>
    </div>
  </div>

  <!-- ── 法的情報（データの送信先・利用条件・免責事項）
       同意ダイアログ（app.html）は初回のみ表示されるため、ここが同意済み利用者にとって唯一の常設導線。 ─────────── -->
  <div class="form-group">
    <label class="label">{{ i18n.t('settings.legal') }}</label>
    <p class="hint">
      <a routerLink="/legal/privacy">{{ i18n.t('consent.privacy') }}</a> ・
      <a routerLink="/legal/terms">{{ i18n.t('consent.terms') }}</a> ・
      <a routerLink="/legal/disclaimer">{{ i18n.t('consent.disclaimer') }}</a>
    </p>
  </div>

  <app-model-priority-panel />

  <app-release-notes-panel />

  <!-- ── GitHubリポジトリ ─────────── -->
  <div class="form-group">
    <label class="label">{{ i18n.t('settings.github') }}</label>
    <p class="hint">
      <a [href]="githubUrl" target="_blank" rel="noopener">{{ githubUrl }}</a>
    </p>
  </div>

  <app-account-panel />
</div>
